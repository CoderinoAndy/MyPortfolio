<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Project 1 | Andy Yu</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <script src="dropdown.js" defer></script>
    </head>
    <body>
        <header class="header">
            <div class="left-section">
                <img class="hamburger" src="icons/hamburger-menu.svg" alt="Menu">
                <span class="logo-wordmark">YuTube!</span>
            </div>
            <div class="middle-section">
                <div class="search-menu">
                    <input class="search-bar" type="text" placeholder="What would you like to know?" aria-label="Open video menu">
                    <button class="search-button tooltip-container" aria-label="Open video menu">
                        <img class="search-icon" src="icons/search.svg" alt="">
                        <span class="tooltip">Videos</span>
                    </button>
                    <div class="search-dropdown">
                        <a href="aboutme.html">Option 1</a>
                        <a href="project-1.html">Option 2</a>
                        <a href="project-2.html">Option 3</a>
                        <a href="resume.html">Option 4</a>
                        <a href="skills.html">Option 5</a>
                        <a href="project-3.html">Option 6</a>
                        <a href="process.html">Option 7</a>
                        <a href="experience.html">Option 8</a>
                        <p id="noresults">No results found! I'm not that advanced yet...</p>
                    </div>
                </div>
                <button class="voice-search-button tooltip-container" aria-label="Search with your voice">
                    <img class="voice-search-icon" src="icons/voice-search-icon.svg" alt="">
                    <span class="tooltip">Search with your voice</span>
                </button>
            </div>
            <div class="right-section">
                <div class="tooltip-container"><img class="right-icon" src="icons/upload.svg" alt="Create"><span class="tooltip">Create</span></div>
                <div class="tooltip-container"><img class="right-icon" src="icons/youtube-apps.svg" alt="YouTube apps"><span class="tooltip">YouTube apps</span></div>
                <div class="tooltip-container"><img class="right-icon" src="icons/notifications.svg" alt="Notifications"><div class="notification-count">3</div><span class="tooltip">Notifications</span></div>
                <img class="user-profile" src="profiles/channel-user.jpeg" alt="User profile">
            </div>
        </header>
        <aside class="sidebar">
            <button class="home-button"><img class="home-icon" src="icons/home.svg" alt=""><p class="sidebartext">Home</p></button>
            <button class="explore-button"><img class="explore-icon" src="icons/explore.svg" alt=""><p class="sidebartext">Explore</p></button>
            <button class="subscriptions-button"><img class="subscriptions-icon" src="icons/subscriptions.svg" alt=""><p class="sidebartext">Subscriptions</p></button>
            <button class="originals-button"><img class="originals-icon" src="icons/originals.svg" alt=""><p class="sidebartext">Originals</p></button>
            <button class="music-button"><img class="music-icon" src="icons/youtube-music.svg" alt=""><p class="sidebartext">Youtube Music</p></button>
            <button class="library-button"><img class="library-icon" src="icons/library.svg" alt=""><p class="sidebartext">Library</p></button>
        </aside>
        <main aria-label="Project 1"></main>
    </body>
</html>
